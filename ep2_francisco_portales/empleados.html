<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empleados - EFPEM</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container-fluid py-2">
  <div class="contenedor-web">

    <!-- ENCABEZADO -->
    <div class="row g-0 borde bloque encabezado mb-2 align-items-center">
      <div class="col-12 col-md-4 col-lg-3 p-3 text-center text-md-start">
        <img src="img/efpem2.png" alt="EFPEM" class="logo-efpem">
      </div>

      <div class="col-12 col-md-8 col-lg-9 p-3">
        <div class="redes">
          <a href="https://www.facebook.com/" target="_blank"><i class="fab fa-facebook"></i></a>
          <a href="https://www.instagram.com/" target="_blank"><i class="fab fa-instagram"></i></a>
          <a href="https://www.tiktok.com/" target="_blank"><i class="fab fa-tiktok"></i></a>
        </div>
      </div>
    </div>

    <!-- MENÚ -->
    <div class="row g-0 mb-2">
      <div class="col-12">
        <nav class="navbar navbar-expand-md borde menu-barra">
          <div class="container-fluid">
            <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal">
              <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-center" id="menuPrincipal">
              <ul class="navbar-nav w-100 justify-content-evenly text-center">
                <li class="nav-item">
                  <a class="nav-link" href="index.html">Inicio</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link activo" href="empleados.html">Empleados</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="sueldo.html">Sueldo líquido</a>
                </li>
              </ul>
            </div>
          </div>
        </nav>
      </div>
    </div>

    <!-- CONTENIDO -->
    <div class="row g-2">
      <!-- FORMULARIO -->
      <div class="col-12 col-md-4 col-lg-3">
        <div class="bloque borde panel-lateral h-100">
          <h2 class="titulo">Empleado</h2>

          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text" id="nombre" class="form-control">
          </div>

          <div class="mb-3">
            <label for="fechaIngreso" class="form-label">Fecha de ingreso</label>
            <input type="date" id="fechaIngreso" class="form-control">
          </div>

         <div class="mb-3">
  <label for="puesto" class="form-label">Puesto</label>
  <select id="puesto" class="form-select">
    <option value="">Seleccione un puesto</option>
    <option value="Secretaria">Secretaria</option>
    <option value="Jardinero">Jardinero</option>
    <option value="Profesor">Profesor</option>
    <option value="Director">Director</option>
    <option value="Guardia">Guardia</option>
  </select>
</div>




          <div class="mb-3">
            <label for="salario" class="form-label">Salario</label>
            <input type="number" id="salario" class="form-control" step="0.01">
          </div>

          <div class="d-grid">
            <button type="button" class="btn btn-primary btn-accion" onclick="guardarEmpleado()">Guardar</button>
          </div>

          <div class="logo-box mt-3">
            <img src="img/usac.png" alt="USAC" class="logo-usac">
          </div>
        </div>
      </div>

      <!-- TABLA -->
      <div class="col-12 col-md-8 col-lg-9">
        <div class="bloque borde panel-tabla h-100">
          <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-3">
            <h2 class="titulo m-0 text-start">Lista de empleados</h2>

            <div class="d-flex flex-column flex-sm-row gap-2">
              <button type="button" class="btn btn-primary btn-accion" onclick="eliminarPrimero()">Eliminar primero</button>
              <button type="button" class="btn btn-primary btn-accion" onclick="eliminarUltimo()">Eliminar último</button>
            </div>
          </div>

          <div class="table-responsive">
           
              <table class="table table-hover text-center align-middle tabla-empleados">

              <thead>
                <tr>
                  <th>Nombre</th>
                  <th>Fecha de ingreso</th>
                  <th>Puesto</th>
                  <th>Salario</th>
                </tr>
              </thead>
              <tbody id="tablaEmpleados">
                
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
