<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sueldo líquido - EFPEM</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container-fluid py-2">
  <div class="contenedor-web">

    <!-- ENCABEZADO -->
    <div class="row g-0 borde bloque encabezado mb-2 align-items-center">
      <div class="col-12 col-md-4 col-lg-3 p-3 text-center text-md-start">
        <img src="img/efpem.png" alt="EFPEM" class="logo-efpem">
      </div>

      <div class="col-12 col-md-8 col-lg-9 p-3">
        <div class="redes">
          <a href="https://www.facebook.com/" target="_blank" class="icono-social">
            <i class="fab fa-facebook"></i>
          </a>
          <a href="https://www.instagram.com/" target="_blank" class="icono-social">
            <i class="fab fa-instagram"></i>
          </a>
          <a href="https://www.tiktok.com/" target="_blank" class="icono-social">
            <i class="fab fa-tiktok"></i>
          </a>
        </div>
      </div>
    </div>

    <!-- MENÚ -->
    <div class="row g-0 mb-2">
      <div class="col-12">
        <nav class="navbar navbar-expand-md borde menu-barra">
          <div class="container-fluid">
            <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal">
              <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-center" id="menuPrincipal">
              <ul class="navbar-nav w-100 justify-content-evenly text-center">
                <li class="nav-item">
                  <a class="nav-link" href="index.html">Inicio</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="empleados.html">Empleados</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link activo" href="sueldo.html">Sueldo líquido</a>
                </li>
              </ul>
            </div>
          </div>
        </nav>
      </div>
    </div>

    <!-- CONTENIDO -->
    <div class="row g-2">
      <div class="col-12 col-md-8 col-lg-9">
        <div class="bloque borde panel-calculo h-100">
          <div class="row g-3">
            <!-- INGRESOS -->
            <div class="col-12 col-md-6">
              <div class="subpanel">
                <h2 class="titulo">Ingresos</h2>

                <div class="mb-3">
                  <label for="salarioBase" class="form-label">Salario</label>
                  <input type="number" id="salarioBase" class="form-control" step="0.01" min="0">
                </div>

                <div class="mb-3">
                  <label for="bonificacion" class="form-label">Bonificación</label>
                  <input type="number" id="bonificacion" class="form-control" step="0.01" min="0">
                </div>

                <div class="mb-3">
                  <label for="comisiones" class="form-label">Comisiones</label>
                  <input type="number" id="comisiones" class="form-control" step="0.01" min="0">
                </div>
              </div>
            </div>

            <!-- EGRESOS -->
            <div class="col-12 col-md-6">
              <div class="subpanel">
                <h2 class="titulo">Egresos</h2>

                <div class="mb-3">
                  <label for="ahorro" class="form-label">Ahorro</label>
                  <input type="number" id="ahorro" class="form-control" step="0.01" min="0">
                </div>

                <div class="mb-3">
                  <label for="prestamos" class="form-label">Préstamos / otros descuentos</label>
                  <input type="number" id="prestamos" class="form-control" step="0.01" min="0">
                </div>
              </div>
            </div>
          </div>

          <div class="d-grid mt-3">
            <button class="btn btn-primary btn-lg" onclick="calcularSueldo()">
              Obtener sueldo líquido
            </button>
          </div>

          <!-- RESULTADOS -->
          <div class="resultado-sueldo mt-4" id="resultadoSueldo">
            <h3 class="mb-3">Resultados</h3>
            <p><strong>Total ganado:</strong> Q 0.00</p>
            <p><strong>IGSS:</strong> Q 0.00</p>
            <p><strong>Total descuentos:</strong> Q 0.00</p>
            <p><strong>Sueldo líquido:</strong> Q 0.00</p>
          </div>
        </div>
      </div>

      <!-- LOGO USAC -->
      <div class="col-12 col-md-4 col-lg-3">
        <div class="bloque borde logo-usac-box h-100">
          <img src="img/usac.png" alt="USAC" class="logo-usac">
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
